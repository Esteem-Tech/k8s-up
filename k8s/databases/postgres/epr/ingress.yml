# Exposes the EPR dev database to developers via a hostname.
#
# Postgres speaks a raw TCP wire protocol, not HTTP, so a standard
# networking.k8s.io Ingress can't route it. Instead this uses Traefik's
# IngressRouteTCP with TLS passthrough: Traefik forwards the raw bytes to the
# CNPG-managed `epr-rw` service (created automatically by the Cluster in
# cluster.yml) and Postgres itself terminates TLS with its own CNPG-issued
# certificate.
#
# Postgres clients only send a TLS ClientHello (and therefore SNI) after the
# initial plaintext SSLRequest handshake, so Traefik cannot route by hostname
# here - HostSNI(`*`) matches any connection arriving on the dedicated
# `postgres` entrypoint (see ../../set-up/traefik-postgres-entrypoint.yml)
# instead. Devs connect with:
#   psql "host=${SUB_DOMAIN}.test.k8s.iradukunda.me port=5432 dbname=epr-dev sslmode=require"
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: epr-dev-db
  namespace: database
spec:
  entryPoints:
    - postgres
  routes:
    - match: HostSNI(`*`)
      services:
        - name: epr-rw
          port: 5432
  tls:
    passthrough: true
