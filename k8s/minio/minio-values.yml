rootUser: "${MINIO_ACCESS_KEY}"
rootPassword: "${MINIO_SECRET_KEY}"

persistence:
  enabled: true
  size: 15Gi
  storageClass: ${STORAGE_CLASS_NAME}

replicas: 2

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring

tls:
  enabled: false  # set true and provide certs for prod

environment:
  # MinIO redirects browser requests hitting the API port to <host>:9001 by
  # default, which isn't reachable through the ingress (only 80/443 are
  # exposed). Point it at the actual console ingress host instead.
  MINIO_BROWSER_REDIRECT_URL: "https://${MINIO_CONSOLE_SUB_DOMAIN}.test.k8s.iradukunda.me"

console:
  enabled: true

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - "${MINIO_SUB_DOMAIN}.test.k8s.iradukunda.me"
  tls:
    - secretName: ${MINIO_SUB_DOMAIN}-tls-secret
      hosts:
        - "${MINIO_SUB_DOMAIN}.test.k8s.iradukunda.me"

consoleIngress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - "${MINIO_CONSOLE_SUB_DOMAIN}.test.k8s.iradukunda.me"
  tls:
    - secretName: ${MINIO_CONSOLE_SUB_DOMAIN}-tls-secret
      hosts:
        - "${MINIO_CONSOLE_SUB_DOMAIN}.test.k8s.iradukunda.me"

updateStrategy:
  type: RollingUpdate
